# ─── Nest Kernel Config ─────────────────────────────────────

instance:
    name: "wren"
    dataDir: "."
    pluginsDir: "./plugins"

# ─── Sessions ───────────────────────────────────────────────
# Sessions are independent pi processes. Listeners attach to them.
# Cron jobs target them. Multiple listeners can watch the same session.

sessions:
    wren:
        pi:
            cwd: /home/wren
            extensions:
                - /app/extensions/attach.ts
    # background:
    #     pi:
    #         cwd: /home/wren
    #     idleTimeoutMinutes: 30

defaultSession: wren

# ─── Server ─────────────────────────────────────────────────
# HTTP server for API, webhooks, and dashboard.
# Plugins register their own routes.

# server:
#     port: 8484
#     token: "env:SERVER_TOKEN"
#     host: "127.0.0.1"
#     trustProxy: false

# ─── Cron ───────────────────────────────────────────────────
# Cron jobs in .md files. Each job targets a session.
# No more "notify" — output goes to all listeners on that session.

# cron:
#     dir: ./cron.d
#     gracePeriodMs: 5000

# ─── Usage Tracking ─────────────────────────────────────────

# tracking:
#     usageLog: ./usage.jsonl
#     capacity: 1000
#     retentionDays: 30

# ─── Plugin Config ──────────────────────────────────────────
# Plugins read their own sections from here.
# The kernel doesn't validate these — plugins decide what they need.

discord:
    token: "env:DISCORD_TOKEN"
    channels:
        "1234567890": "wren"    # channel ID -> session name

